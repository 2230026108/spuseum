<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient>
  <linearGradient id="bridge" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#f0d78c"/><stop offset="100%" stop-color="#8ec8f2"/></linearGradient></defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <text x="400" y="80" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="28" font-weight="bold">结论</text>
  <line x1="80" y1="300" x2="720" y2="300" stroke="url(#bridge)" stroke-width="4" opacity="0.65"/>
  <circle cx="80" cy="300" r="22" fill="#f0d78c" opacity="0.55"/>
  <text x="80" y="350" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="15" font-weight="bold">古丝绸之路</text>
  <text x="80" y="370" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="11">过去的连接</text>
  <circle cx="720" cy="300" r="22" fill="#8ec8f2" opacity="0.55"/>
  <text x="720" y="350" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="15" font-weight="bold">数字网络</text>
  <text x="720" y="370" text-anchor="middle" fill="#8ec8f2" font-family="sans-serif" font-size="11">今天的连接</text>
  <text x="400" y="265" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="28" font-weight="bold">→</text>
  <text x="400" y="440" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-size="15">丝绸之路在过去连接了文明</text>
  <text x="400" y="475" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="15" font-weight="bold">技术在今天连接着文明</text>
</svg>
