<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="routeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0d78c"/>
      <stop offset="50%" stop-color="#f5da81"/>
      <stop offset="100%" stop-color="#f0d78c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1000" height="520" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="104" x2="1000" y2="104"/><line x1="0" y1="208" x2="1000" y2="208"/>
    <line x1="0" y1="312" x2="1000" y2="312"/><line x1="0" y1="416" x2="1000" y2="416"/>
    <line x1="200" y1="0" x2="200" y2="520"/><line x1="400" y1="0" x2="400" y2="520"/>
    <line x1="600" y1="0" x2="600" y2="520"/><line x1="800" y1="0" x2="800" y2="520"/>
  </g>

  <!-- Silk Road Main Route -->
  <path d="M120,190 C200,170 250,150 320,180 C400,220 420,240 480,200 C540,160 600,190 680,170 C730,160 780,180 850,200"
    fill="none" stroke="url(#routeGrad)" stroke-width="5" opacity="0.85" filter="url(#glow)"/>

  <!-- Northern Route -->
  <path d="M120,190 C180,130 250,110 320,140 C380,165 440,190 480,200"
    fill="none" stroke="#f0d78c" stroke-width="2.5" stroke-dasharray="10,5" opacity="0.45"/>

  <!-- Southern Route -->
  <path d="M320,180 C400,230 440,260 500,250 C560,240 620,220 680,230 C720,240 770,220 850,200"
    fill="none" stroke="#f0d78c" stroke-width="2.5" stroke-dasharray="10,5" opacity="0.45"/>

  <!-- Maritime Route -->
  <path d="M680,170 C700,210 720,290 680,310 C640,330 600,310 580,290 C560,270 570,240 550,220"
    fill="none" stroke="#8ec8f2" stroke-width="2.5" stroke-dasharray="7,7" opacity="0.55"/>

  <!-- City Markers - China / Chang'an -->
  <circle cx="120" cy="190" r="13" fill="#f0d78c" opacity="0.9"/>
  <circle cx="120" cy="190" r="20" fill="#f0d78c" opacity="0.25"/>
  <text x="120" y="215" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">中国</text>
  <text x="120" y="235" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="11">长安</text>

  <!-- Dunhuang -->
  <circle cx="205" cy="163" r="8" fill="#f0d78c" opacity="0.8"/>
  <text x="205" y="185" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10">敦煌</text>

  <!-- Central Asia / Samarkand -->
  <circle cx="320" cy="180" r="11" fill="#f0d78c" opacity="0.9"/>
  <circle cx="320" cy="180" r="17" fill="#f0d78c" opacity="0.2"/>
  <text x="320" y="200" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">中亚</text>
  <text x="320" y="220" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="11">撒马尔罕</text>

  <!-- Persia -->
  <circle cx="480" cy="200" r="11" fill="#f0d78c" opacity="0.9"/>
  <circle cx="480" cy="200" r="17" fill="#f0d78c" opacity="0.2"/>
  <text x="480" y="222" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">波斯</text>

  <!-- Baghdad -->
  <circle cx="590" cy="195" r="8" fill="#f0d78c" opacity="0.8"/>
  <text x="590" y="215" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10">巴格达</text>

  <!-- Constantinople -->
  <circle cx="730" cy="175" r="9" fill="#f0d78c" opacity="0.8"/>
  <text x="730" y="198" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="10">君士坦丁堡</text>

  <!-- Europe / Rome -->
  <circle cx="850" cy="200" r="13" fill="#f0d78c" opacity="0.9"/>
  <circle cx="850" cy="200" r="20" fill="#f0d78c" opacity="0.25"/>
  <text x="850" y="222" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">欧洲</text>
  <text x="850" y="242" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="11">罗马</text>

  <!-- India -->
  <circle cx="550" cy="280" r="10" fill="#8ec8f2" opacity="0.8"/>
  <text x="560" y="300" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="13" font-weight="bold">印度</text>
  <line x1="500" y1="210" x2="550" y2="275" stroke="#8ec8f2" stroke-width="1.5" stroke-dasharray="5,5" opacity="0.35"/>

  <!-- Trade Goods -->
  <text x="240" y="310" fill="#f0d78c" font-family="sans-serif" font-size="10" opacity="0.7">丝绸 · 香料 · 瓷器 · 典籍</text>
  <text x="560" y="325" fill="#8ec8f2" font-family="sans-serif" font-size="10" opacity="0.7">宝石 · 象牙 · 纺织品</text>

  <!-- Legend -->
  <g transform="translate(15, 455)">
    <rect x="0" y="0" width="200" height="50" rx="5" fill="#0d1117" stroke="#f0d78c" stroke-width="1" opacity="0.6"/>
    <text x="10" y="14" fill="#f0d78c" font-family="sans-serif" font-size="12" font-weight="bold">丝绸之路</text>
    <line x1="10" y1="26" x2="45" y2="26" stroke="#f0d78c" stroke-width="2.5"/>
    <text x="52" y="28" fill="#ffffff" font-family="sans-serif" font-size="9">陆上路线</text>
    <line x1="10" y1="36" x2="45" y2="36" stroke="#8ec8f2" stroke-width="2.5" stroke-dasharray="6,6"/>
    <text x="52" y="38" fill="#ffffff" font-family="sans-serif" font-size="9">海上路线</text>
  </g>

  <!-- Title -->
  <text x="500" y="45" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="28" font-weight="bold">丝绸之路</text>
  <text x="500" y="72" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-size="12">连接文明的古代贸易路线</text>
</svg>
