<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient></defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <text x="400" y="80" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="28" font-weight="bold">历史的十字路口</text>
  <rect x="70" y="130" width="200" height="200" rx="10" fill="#16213e" stroke="#f0d78c" stroke-width="1.5"/>
  <text x="170" y="230" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="15" font-weight="bold">佛教传播</text>
  <text x="170" y="260" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="sans-serif" font-size="12">印度 → 中国</text>
  <rect x="300" y="130" width="200" height="200" rx="10" fill="#16213e" stroke="#f0d78c" stroke-width="1.5"/>
