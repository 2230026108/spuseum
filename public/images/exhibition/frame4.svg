  <rect x="530" y="130" width="200" height="200" rx="10" fill="#16213e" stroke="#f0d78c" stroke-width="1.5"/>
  <text x="630" y="230" text-anchor="middle" fill="#f0d78c" font-family="sans-serif" font-size="15" font-weight="bold">伊斯兰-中华</text>
